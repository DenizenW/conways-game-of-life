name: Auto-approve

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed

permissions:
  pull-requests: write

concurrency:
  group: auto-approve-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  auto-approve:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Find PR number from workflow run
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
            });
            const pr = prs.find(p => p.head.sha === headSha);
            if (!pr) {
              core.warning('No matching open PR found — skipping.');
              return;
            }
            core.setOutput('pr_number', pr.number);

      - name: Approve PR
        if: steps.find-pr.outputs.pr_number
        uses: hmarr/auto-approve-action@v4
        with:
          pull-request-number: ${{ steps.find-pr.outputs.pr_number }}
